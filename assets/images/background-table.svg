<?xml version="1.0" encoding="UTF-8"?>
<svg width="1920" height="1080" viewBox="0 0 1920 1080" xmlns="http://www.w3.org/2000/svg">
  <!-- 掼蛋大师 - 牌桌背景 - 典雅中国风 -->
  <!-- 设计师：画虾 | 日期：2026-03-20 -->
  
  <defs>
    <!-- 木质纹理渐变 -->
    <linearGradient id="woodGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B4513;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#A0522D;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8B4513;stop-opacity:1" />
    </linearGradient>
    
    <!-- 牌桌布面渐变 -->
    <radialGradient id="tableGrad" cx="50%" cy="50%" r="70%">
      <stop offset="0%" style="stop-color:#2E5936;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1E3A25;stop-opacity:1" />
    </radialGradient>
    
    <!-- 金色边框渐变 -->
    <linearGradient id="goldBorder" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#D4AF37;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#F4E5B1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D4AF37;stop-opacity:1" />
    </linearGradient>
    
    <!-- 传统回纹图案 -->
    <pattern id="huiPattern" x="0" y="0" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 0 0 L 30 0 L 30 8 L 8 8 L 8 22 L 30 22 L 30 30 L 0 30 L 0 22 L 22 22 L 22 8 L 0 8 Z" 
            fill="#D4AF37" opacity="0.15"/>
    </pattern>
    
    <!-- 光晕效果 -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- 底层木质桌面 -->
  <rect width="1920" height="1080" fill="url(#woodGrad)"/>
  
  <!-- 木质纹理线条 -->
  <g opacity="0.3">
    <line x1="0" y1="100" x2="1920" y2="100" stroke="#654321" stroke-width="2"/>
    <line x1="0" y1="200" x2="1920" y2="200" stroke="#654321" stroke-width="1"/>
    <line x1="0" y1="350" x2="1920" y2="350" stroke="#654321" stroke-width="2"/>
    <line x1="0" y1="500" x2="1920" y2="500" stroke="#654321" stroke-width="1"/>
    <line x1="0" y1="700" x2="1920" y2="700" stroke="#654321" stroke-width="2"/>
    <line x1="0" y1="900" x2="1920" y2="900" stroke="#654321" stroke-width="1"/>
  </g>
  
  <!-- 牌桌布面区域 (椭圆形) -->
  <ellipse cx="960" cy="540" rx="800" ry="400" fill="url(#tableGrad)" stroke="url(#goldBorder)" stroke-width="8"/>
  
  <!-- 布面回纹装饰 -->
  <ellipse cx="960" cy="540" rx="780" ry="380" fill="url(#huiPattern)" stroke="none"/>
  
  <!-- 内圈金色边框 -->
  <ellipse cx="960" cy="540" rx="780" ry="380" fill="none" stroke="url(#goldBorder)" stroke-width="3" opacity="0.6"/>
  
  <!-- 四角装饰 (传统云纹简化版) -->
  <g transform="translate(200, 180)">
    <circle r="40" fill="none" stroke="#D4AF37" stroke-width="2"/>
    <path d="M 0 -30 Q 15 -15 0 0 Q -15 -15 0 -30" fill="#D4AF37" opacity="0.6"/>
    <path d="M 0 30 Q 15 15 0 0 Q -15 15 0 30" fill="#D4AF37" opacity="0.6"/>
  </g>
  
  <g transform="translate(1720, 180)">
    <circle r="40" fill="none" stroke="#D4AF37" stroke-width="2"/>
    <path d="M 0 -30 Q 15 -15 0 0 Q -15 -15 0 -30" fill="#D4AF37" opacity="0.6"/>
    <path d="M 0 30 Q 15 15 0 0 Q -15 15 0 30" fill="#D4AF37" opacity="0.6"/>
  </g>
  
  <g transform="translate(200, 900)">
    <circle r="40" fill="none" stroke="#D4AF37" stroke-width="2"/>
    <path d="M 0 -30 Q 15 -15 0 0 Q -15 -15 0 -30" fill="#D4AF37" opacity="0.6"/>
    <path d="M 0 30 Q 15 15 0 0 Q -15 15 0 30" fill="#D4AF37" opacity="0.6"/>
  </g>
  
  <g transform="translate(1720, 900)">
    <circle r="40" fill="none" stroke="#D4AF37" stroke-width="2"/>
    <path d="M 0 -30 Q 15 -15 0 0 Q -15 -15 0 -30" fill="#D4AF37" opacity="0.6"/>
    <path d="M 0 30 Q 15 15 0 0 Q -15 15 0 30" fill="#D4AF37" opacity="0.6"/>
  </g>
  
  <!-- 中央出牌区域标记 -->
  <ellipse cx="960" cy="540" rx="300" ry="150" fill="none" stroke="#D4AF37" stroke-width="2" stroke-dasharray="10,5" opacity="0.4"/>
  
  <!-- 玩家位置标记 (4 个方位) -->
  <!-- 上方玩家 -->
  <g transform="translate(960, 200)">
    <rect x="-60" y="-20" width="120" height="40" rx="20" fill="#D4AF37" opacity="0.3"/>
    <text x="0" y="8" font-family="Noto Serif SC, serif" font-size="18" fill="#D4AF37" text-anchor="middle">玩家 4</text>
  </g>
  
  <!-- 下方玩家 -->
  <g transform="translate(960, 880)">
    <rect x="-60" y="-20" width="120" height="40" rx="20" fill="#D4AF37" opacity="0.3"/>
    <text x="0" y="8" font-family="Noto Serif SC, serif" font-size="18" fill="#D4AF37" text-anchor="middle">玩家 2 (你)</text>
  </g>
  
  <!-- 左方玩家 -->
  <g transform="translate(280, 540)">
    <rect x="-50" y="-15" width="100" height="30" rx="15" fill="#D4AF37" opacity="0.3"/>
    <text x="0" y="8" font-family="Noto Serif SC, serif" font-size="16" fill="#D4AF37" text-anchor="middle">玩家 3</text>
  </g>
  
  <!-- 右方玩家 -->
  <g transform="translate(1640, 540)">
    <rect x="-50" y="-15" width="100" height="30" rx="15" fill="#D4AF37" opacity="0.3"/>
    <text x="0" y="8" font-family="Noto Serif SC, serif" font-size="16" fill="#D4AF37" text-anchor="middle">玩家 1</text>
  </g>
  
  <!-- 顶部装饰纹样 -->
  <g transform="translate(960, 60)">
    <path d="M -100 0 L -80 -20 L -60 0 L -40 -20 L -20 0 L 0 -20 L 20 0 L 40 -20 L 60 0 L 80 -20 L 100 0" 
          fill="none" stroke="#D4AF37" stroke-width="2" opacity="0.5"/>
  </g>
  
  <!-- 底部装饰纹样 -->
  <g transform="translate(960, 1020)">
    <path d="M -100 0 L -80 20 L -60 0 L -40 20 L -20 0 L 0 20 L 20 0 L 40 20 L 60 0 L 80 20 L 100 0" 
          fill="none" stroke="#D4AF37" stroke-width="2" opacity="0.5"/>
  </g>
  
  <!-- 剩余牌数显示区 -->
  <g transform="translate(960, 650)">
    <rect x="-80" y="-15" width="160" height="30" rx="15" fill="#1A1A1A" opacity="0.6"/>
    <rect x="-80" y="-15" width="160" height="30" rx="15" fill="none" stroke="#D4AF37" stroke-width="1"/>
    <text x="0" y="8" font-family="Noto Serif SC, serif" font-size="16" fill="#D4AF37" text-anchor="middle">剩余牌数：0</text>
  </g>
</svg>
