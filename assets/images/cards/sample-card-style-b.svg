<svg width="200" height="280" viewBox="0 0 200 280" xmlns="http://www.w3.org/2000/svg">
  <!-- 方案 B: 现代轻奢风 - 红桃 A -->
  
  <!-- 定义渐变 -->
  <defs>
    <linearGradient id="cardBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F8F9FA;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="goldBorder" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D4AF37;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#F4E5B1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#C9A961;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- 卡牌背景 -->
  <rect x="5" y="5" width="190" height="270" rx="8" fill="url(#cardBg)" stroke="url(#goldBorder)" stroke-width="3"/>
  
  <!-- 金属质感内边框 -->
  <rect x="10" y="10" width="180" height="260" rx="5" fill="none" stroke="#C9A961" stroke-width="1" opacity="0.5"/>
  
  <!-- 左上角点数 -->
  <text x="22" y="42" font-family="Source Han Sans CN, sans-serif" font-size="26" fill="#1B263B" font-weight="700">A</text>
  <text x="24" y="68" font-family="Arial" font-size="22" fill="#FF6B6B">♥</text>
  
  <!-- 右上角点数 (倒置) -->
  <text x="178" y="238" font-family="Source Han Sans CN, sans-serif" font-size="26" fill="#1B263B" font-weight="700" transform="rotate(180 178 238)">A</text>
  <text x="176" y="212" font-family="Arial" font-size="22" fill="#FF6B6B" transform="rotate(180 176 212)">♥</text>
  
  <!-- 中央大花色 (带渐变) -->
  <defs>
    <linearGradient id="heartGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FF8E8E;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF6B6B;stop-opacity:1" />
    </linearGradient>
  </defs>
  <text x="100" y="165" font-family="Arial" font-size="85" fill="url(#heartGrad)" text-anchor="middle" filter="url(#glow)">♥</text>
  
  <!-- 四角金属装饰 -->
  <circle cx="15" cy="15" r="4" fill="#C9A961"/>
  <circle cx="185" cy="15" r="4" fill="#C9A961"/>
  <circle cx="15" cy="265" r="4" fill="#C9A961"/>
  <circle cx="185" cy="265" r="4" fill="#C9A961"/>
</svg>
