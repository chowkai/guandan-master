<svg width="200" height="280" viewBox="0 0 200 280" xmlns="http://www.w3.org/2000/svg">
  <!-- 方案 C: 清新国潮风 - 红桃 A -->
  
  <!-- 定义渐变 -->
  <defs>
    <linearGradient id="cardBgC" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F1FAEE;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="borderGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#E63946;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#FF6B6B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E63946;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- 卡牌背景 -->
  <rect x="8" y="8" width="184" height="264" rx="20" fill="url(#cardBgC)" stroke="url(#borderGrad)" stroke-width="4"/>
  
  <!-- 活泼内边框 -->
  <rect x="14" y="14" width="172" height="252" rx="16" fill="none" stroke="#457B9D" stroke-width="2" stroke-dasharray="8,4"/>
  
  <!-- 左上角点数 (圆润字体) -->
  <text x="24" y="48" font-family="Varela Round, sans-serif" font-size="30" fill="#1D3557" font-weight="bold">A</text>
  <text x="26" y="76" font-family="Arial" font-size="24" fill="#E63946">♥</text>
  
  <!-- 右上角点数 (倒置) -->
  <text x="176" y="232" font-family="Varela Round, sans-serif" font-size="30" fill="#1D3557" font-weight="bold" transform="rotate(180 176 232)">A</text>
  <text x="174" y="204" font-family="Arial" font-size="24" fill="#E63946" transform="rotate(180 174 204)">♥</text>
  
  <!-- 中央大花色 -->
  <text x="100" y="165" font-family="Arial" font-size="90" fill="#E63946" text-anchor="middle" opacity="0.95">♥</text>
  
  <!-- 国潮风装饰元素 (四角圆点) -->
  <circle cx="20" cy="20" r="6" fill="#FFB703"/>
  <circle cx="180" cy="20" r="6" fill="#FFB703"/>
  <circle cx="20" cy="260" r="6" fill="#FFB703"/>
  <circle cx="180" cy="260" r="6" fill="#FFB703"/>
  
  <!-- 侧边装饰条纹 -->
  <rect x="8" y="100" width="6" height="80" rx="3" fill="#457B9D" opacity="0.3"/>
  <rect x="186" y="100" width="6" height="80" rx="3" fill="#457B9D" opacity="0.3"/>
</svg>
