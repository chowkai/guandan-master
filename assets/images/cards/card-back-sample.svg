<svg width="200" height="280" viewBox="0 0 200 280" xmlns="http://www.w3.org/2000/svg">
  <!-- 卡牌背面设计 - 中国风纹样 -->
  
  <defs>
    <!-- 传统回纹图案 -->
    <pattern id="huiPattern" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 0 0 L 20 0 L 20 5 L 5 5 L 5 15 L 20 15 L 20 20 L 0 20 L 0 15 L 15 15 L 15 5 L 0 5 Z" 
            fill="#D4AF37" opacity="0.3"/>
    </pattern>
    
    <!-- 渐变背景 -->
    <linearGradient id="cardBackGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#C41E3A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8B0000;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- 卡牌外框 -->
  <rect x="5" y="5" width="190" height="270" rx="15" fill="url(#cardBackGrad)" stroke="#D4AF37" stroke-width="2"/>
  
  <!-- 白色内边距 -->
  <rect x="12" y="12" width="176" height="256" rx="10" fill="#F5F0E6"/>
  
  <!-- 回纹背景 -->
  <rect x="18" y="18" width="164" height="244" rx="6" fill="url(#huiPattern)"/>
  
  <!-- 中央装饰图案 (简化版"掼蛋"字样或纹样) -->
  <g transform="translate(100, 140)">
    <!-- 外圆 -->
    <circle r="50" fill="none" stroke="#C41E3A" stroke-width="2"/>
    <!-- 内圆 -->
    <circle r="40" fill="none" stroke="#D4AF37" stroke-width="1"/>
    <!-- 中心菱形 -->
    <rect x="-15" y="-15" width="30" height="30" fill="#C41E3A" transform="rotate(45)"/>
    <!-- 四角装饰 -->
    <circle cx="-35" cy="-35" r="4" fill="#D4AF37"/>
    <circle cx="35" cy="-35" r="4" fill="#D4AF37"/>
    <circle cx="-35" cy="35" r="4" fill="#D4AF37"/>
    <circle cx="35" cy="35" r="4" fill="#D4AF37"/>
  </g>
  
  <!-- 四角角花 -->
  <path d="M 25 25 L 35 25 L 35 30 L 30 30 L 30 35 L 25 35 Z" fill="#D4AF37" opacity="0.8"/>
  <path d="M 175 25 L 165 25 L 165 30 L 170 30 L 170 35 L 175 35 Z" fill="#D4AF37" opacity="0.8"/>
  <path d="M 25 255 L 35 255 L 35 250 L 30 250 L 30 245 L 25 245 Z" fill="#D4AF37" opacity="0.8"/>
  <path d="M 175 255 L 165 255 L 165 250 L 170 250 L 170 245 L 175 245 Z" fill="#D4AF37" opacity="0.8"/>
</svg>
