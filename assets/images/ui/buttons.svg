<?xml version="1.0" encoding="UTF-8"?>
<svg width="800" height="600" viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <!-- 掼蛋大师 - UI 按钮套装 - 典雅中国风 -->
  <!-- 设计师：画虾 | 日期：2026-03-20 -->
  
  <defs>
    <!-- 主按钮渐变 (朱红) -->
    <linearGradient id="btnPrimaryGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E03A4A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#C41E3A;stop-opacity:1" />
    </linearGradient>
    
    <!-- 次按钮渐变 (金色) -->
    <linearGradient id="btnSecondaryGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#F4E5B1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D4AF37;stop-opacity:1" />
    </linearGradient>
    
    <!-- 禁用按钮渐变 -->
    <linearGradient id="btnDisabledGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#BDC3C7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#95A5A6;stop-opacity:1" />
    </linearGradient>
    
    <!-- 危险按钮渐变 -->
    <linearGradient id="btnDangerGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E74C3C;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#C0392B;stop-opacity:1" />
    </linearGradient>
    
    <!-- 金色边框渐变 -->
    <linearGradient id="goldBorder" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#D4AF37;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#F4E5B1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D4AF37;stop-opacity:1" />
    </linearGradient>
    
    <!-- 按钮阴影 -->
    <filter id="btnShadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
    
    <!-- 按钮悬停光晕 -->
    <filter id="btnGlow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- 标题 -->
  <text x="400" y="40" font-family="Noto Serif SC, serif" font-size="24" fill="#1A1A1A" text-anchor="middle" font-weight="bold">掼蛋大师 - 按钮套装</text>
  
  <!-- ==================== 主按钮 (出牌) ==================== -->
  <g transform="translate(100, 80)">
    <!-- 正常状态 -->
    <rect x="0" y="0" width="160" height="50" rx="25" fill="url(#btnPrimaryGrad)" stroke="#A01830" stroke-width="2" filter="url(#btnShadow)"/>
    <text x="80" y="30" font-family="Noto Serif SC, serif" font-size="18" fill="#FFFFFF" text-anchor="middle" font-weight="bold">出牌</text>
    
    <!-- 悬停状态 -->
    <rect x="0" y="70" width="160" height="50" rx="25" fill="url(#btnPrimaryGrad)" stroke="#F4E5B1" stroke-width="2" filter="url(#btnGlow)"/>
    <text x="80" y="100" font-family="Noto Serif SC, serif" font-size="18" fill="#FFFFFF" text-anchor="middle" font-weight="bold">出牌</text>
    <rect x="0" y="70" width="160" height="50" rx="25" fill="none" stroke="#F4E5B1" stroke-width="3" opacity="0.5"/>
    
    <!-- 按下状态 -->
    <rect x="0" y="140" width="160" height="50" rx="25" fill="#A01830" stroke="#8B1428" stroke-width="2"/>
    <text x="80" y="170" font-family="Noto Serif SC, serif" font-size="18" fill="#F4E5B1" text-anchor="middle" font-weight="bold">出牌</text>
    
    <!-- 标签 -->
    <text x="80" y="200" font-family="Noto Serif SC, serif" font-size="14" fill="#555555" text-anchor="middle">主按钮 - 出牌</text>
  </g>
  
  <!-- ==================== 次按钮 (不出/提示) ==================== -->
  <g transform="translate(320, 80)">
    <!-- 正常状态 - 不出 -->
    <rect x="0" y="0" width="120" height="45" rx="22" fill="#F5F0E6" stroke="url(#goldBorder)" stroke-width="2" filter="url(#btnShadow)"/>
    <text x="60" y="28" font-family="Noto Serif SC, serif" font-size="16" fill="#1A1A1A" text-anchor="middle" font-weight="bold">不出</text>
    
    <!-- 悬停状态 -->
    <rect x="0" y="70" width="120" height="45" rx="22" fill="#FFFFFF" stroke="url(#goldBorder)" stroke-width="2" filter="url(#btnGlow)"/>
    <text x="60" y="98" font-family="Noto Serif SC, serif" font-size="16" fill="#1A1A1A" text-anchor="middle" font-weight="bold">不出</text>
    
    <!-- 正常状态 - 提示 -->
    <rect x="0" y="140" width="120" height="45" rx="22" fill="#F5F0E6" stroke="url(#goldBorder)" stroke-width="2" filter="url(#btnShadow)"/>
    <text x="60" y="168" font-family="Noto Serif SC, serif" font-size="16" fill="#1A1A1A" text-anchor="middle" font-weight="bold">提示</text>
    
    <!-- 标签 -->
    <text x="60" y="200" font-family="Noto Serif SC, serif" font-size="14" fill="#555555" text-anchor="middle">次按钮 - 边框式</text>
  </g>
  
  <!-- ==================== 危险按钮 (认输) ==================== -->
  <g transform="translate(500, 80)">
    <!-- 正常状态 -->
    <rect x="0" y="0" width="100" height="45" rx="22" fill="url(#btnDangerGrad)" stroke="#A93226" stroke-width="2" filter="url(#btnShadow)"/>
    <text x="50" y="28" font-family="Noto Serif SC, serif" font-size="16" fill="#FFFFFF" text-anchor="middle" font-weight="bold">认输</text>
    
    <!-- 悬停状态 -->
    <rect x="0" y="70" width="100" height="45" rx="22" fill="url(#btnDangerGrad)" stroke="#E74C3C" stroke-width="2" filter="url(#btnGlow)"/>
    <text x="50" y="98" font-family="Noto Serif SC, serif" font-size="16" fill="#FFFFFF" text-anchor="middle" font-weight="bold">认输</text>
    
    <!-- 标签 -->
    <text x="50" y="130" font-family="Noto Serif SC, serif" font-size="14" fill="#555555" text-anchor="middle">危险按钮</text>
  </g>
  
  <!-- ==================== 禁用按钮 ==================== -->
  <g transform="translate(100, 320)">
    <rect x="0" y="0" width="160" height="50" rx="25" fill="url(#btnDisabledGrad)" stroke="#7F8C8D" stroke-width="2"/>
    <text x="80" y="30" font-family="Noto Serif SC, serif" font-size="18" fill="#ECF0F1" text-anchor="middle">不可用</text>
    <text x="80" y="80" font-family="Noto Serif SC, serif" font-size="14" fill="#555555" text-anchor="middle">禁用状态</text>
  </g>
  
  <!-- ==================== 小按钮 (功能按钮) ==================== -->
  <g transform="translate(320, 320)">
    <!-- 设置 -->
    <circle cx="30" cy="30" r="30" fill="#F5F0E6" stroke="url(#goldBorder)" stroke-width="2" filter="url(#btnShadow)"/>
    <text x="30" y="38" font-size="20" text-anchor="middle">⚙️</text>
    
    <!-- 记牌器 -->
    <circle cx="100" cy="30" r="30" fill="#F5F0E6" stroke="url(#goldBorder)" stroke-width="2" filter="url(#btnShadow)"/>
    <text x="100" y="38" font-size="20" text-anchor="middle">📊</text>
    
    <!-- 回放 -->
    <circle cx="170" cy="30" r="30" fill="#F5F0E6" stroke="url(#goldBorder)" stroke-width="2" filter="url(#btnShadow)"/>
    <text x="170" y="38" font-size="20" text-anchor="middle">🎬</text>
    
    <!-- 音量 -->
    <circle cx="240" cy="30" r="30" fill="#F5F0E6" stroke="url(#goldBorder)" stroke-width="2" filter="url(#btnShadow)"/>
    <text x="240" y="38" font-size="20" text-anchor="middle">🔊</text>
    
    <!-- 标签 -->
    <text x="135" y="90" font-family="Noto Serif SC, serif" font-size="14" fill="#555555" text-anchor="middle">功能按钮 (圆形)</text>
  </g>
  
  <!-- ==================== 按钮尺寸参考 ==================== -->
  <g transform="translate(500, 250)">
    <text x="0" y="0" font-family="Noto Serif SC, serif" font-size="14" fill="#1A1A1A" font-weight="bold">按钮尺寸规范:</text>
    
    <line x1="0" y1="20" x2="160" y2="20" stroke="#C41E3A" stroke-width="2"/>
    <text x="80" y="15" font-family="Arial" font-size="12" fill="#C41E3A" text-anchor="middle">160px</text>
    
    <line x1="0" y1="20" x2="0" y2="70" stroke="#C41E3A" stroke-width="2"/>
    <text x="-10" y="50" font-family="Arial" font-size="12" fill="#C41E3A" text-anchor="end">50px</text>
    
    <text x="0" y="100" font-family="Arial" font-size="12" fill="#555555">主按钮：160 × 50 px</text>
    <text x="0" y="120" font-family="Arial" font-size="12" fill="#555555">次按钮：120 × 45 px</text>
    <text x="0" y="140" font-family="Arial" font-size="12" fill="#555555">功能按钮：直径 60 px</text>
    <text x="0" y="160" font-family="Arial" font-size="12" fill="#555555">圆角：按钮高度的一半</text>
  </g>
  
  <!-- 装饰边框 -->
  <rect x="10" y="10" width="780" height="580" rx="10" fill="none" stroke="#D4AF37" stroke-width="2" stroke-dasharray="10,5"/>
</svg>
