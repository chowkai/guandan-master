<?xml version="1.0" encoding="UTF-8"?>
<svg width="600" height="800" viewBox="0 0 600 800" xmlns="http://www.w3.org/2000/svg">
  <!-- 掼蛋大师 - UI 图标套装 - 典雅中国风 -->
  <!-- 设计师：画虾 | 日期：2026-03-20 -->
  
  <defs>
    <!-- 金色渐变 -->
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F4E5B1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D4AF37;stop-opacity:1" />
    </linearGradient>
    
    <!-- 朱红渐变 -->
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E03A4A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#C41E3A;stop-opacity:1" />
    </linearGradient>
    
    <!-- 图标阴影 -->
    <filter id="iconShadow">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <!-- 标题 -->
  <text x="300" y="40" font-family="Noto Serif SC, serif" font-size="24" fill="#1A1A1A" text-anchor="middle" font-weight="bold">掼蛋大师 - 图标套装</text>
  
  <!-- ==================== 功能图标 ==================== -->
  <g transform="translate(50, 80)">
    <text x="100" y="-20" font-family="Noto Serif SC, serif" font-size="16" fill="#1A1A1A" text-anchor="middle" font-weight="bold">功能图标 (60×60 px)</text>
    
    <!-- 设置 -->
    <g transform="translate(0, 0)">
      <circle cx="30" cy="30" r="28" fill="#F5F0E6" stroke="url(#goldGrad)" stroke-width="2" filter="url(#iconShadow)"/>
      <text x="30" y="38" font-size="28" text-anchor="middle">⚙️</text>
      <text x="30" y="75" font-family="Noto Serif SC, serif" font-size="12" fill="#555555" text-anchor="middle">设置</text>
    </g>
    
    <!-- 提示 -->
    <g transform="translate(80, 0)">
      <circle cx="30" cy="30" r="28" fill="#F5F0E6" stroke="url(#goldGrad)" stroke-width="2" filter="url(#iconShadow)"/>
      <text x="30" y="38" font-size="28" text-anchor="middle">💡</text>
      <text x="30" y="75" font-family="Noto Serif SC, serif" font-size="12" fill="#555555" text-anchor="middle">提示</text>
    </g>
    
    <!-- 记牌器 -->
    <g transform="translate(160, 0)">
      <circle cx="30" cy="30" r="28" fill="#F5F0E6" stroke="url(#goldGrad)" stroke-width="2" filter="url(#iconShadow)"/>
      <text x="30" y="38" font-size="28" text-anchor="middle">📊</text>
      <text x="30" y="75" font-family="Noto Serif SC, serif" font-size="12" fill="#555555" text-anchor="middle">记牌器</text>
    </g>
    
    <!-- 回放 -->
    <g transform="translate(0, 90)">
      <circle cx="30" cy="30" r="28" fill="#F5F0E6" stroke="url(#goldGrad)" stroke-width="2" filter="url(#iconShadow)"/>
      <text x="30" y="38" font-size="28" text-anchor="middle">🎬</text>
      <text x="30" y="75" font-family="Noto Serif SC, serif" font-size="12" fill="#555555" text-anchor="middle">回放</text>
    </g>
    
    <!-- 音量 -->
    <g transform="translate(80, 90)">
      <circle cx="30" cy="30" r="28" fill="#F5F0E6" stroke="url(#goldGrad)" stroke-width="2" filter="url(#iconShadow)"/>
      <text x="30" y="38" font-size="28" text-anchor="middle">🔊</text>
      <text x="30" y="75" font-family="Noto Serif SC, serif" font-size="12" fill="#555555" text-anchor="middle">音量</text>
    </g>
    
    <!-- 全屏 -->
    <g transform="translate(160, 90)">
      <circle cx="30" cy="30" r="28" fill="#F5F0E6" stroke="url(#goldGrad)" stroke-width="2" filter="url(#iconShadow)"/>
      <text x="30" y="38" font-size="28" text-anchor="middle">⛶</text>
      <text x="30" y="75" font-family="Noto Serif SC, serif" font-size="12" fill="#555555" text-anchor="middle">全屏</text>
    </g>
  </g>
  
  <!-- ==================== 状态图标 ==================== -->
  <g transform="translate(350, 80)">
    <text x="100" y="-20" font-family="Noto Serif SC, serif" font-size="16" fill="#1A1A1A" text-anchor="middle" font-weight="bold">状态图标</text>
    
    <!-- 准备 -->
    <g transform="translate(0, 0)">
      <circle cx="30" cy="30" r="28" fill="#2ECC71" stroke="#27AE60" stroke-width="2" filter="url(#iconShadow)"/>
      <text x="30" y="38" font-size="24" text-anchor="middle" fill="#FFFFFF">✓</text>
      <text x="30" y="75" font-family="Noto Serif SC, serif" font-size="12" fill="#555555" text-anchor="middle">准备</text>
    </g>
    
    <!-- 思考中 -->
    <g transform="translate(80, 0)">
      <circle cx="30" cy="30" r="28" fill="#F39C12" stroke="#E67E22" stroke-width="2" filter="url(#iconShadow)"/>
      <text x="30" y="38" font-size="24" text-anchor="middle" fill="#FFFFFF">🤔</text>
      <text x="30" y="75" font-family="Noto Serif SC, serif" font-size="12" fill="#555555" text-anchor="middle">思考</text>
    </g>
    
    <!-- 出牌 -->
    <g transform="translate(160, 0)">
      <circle cx="30" cy="30" r="28" fill="#3498DB" stroke="#2980B9" stroke-width="2" filter="url(#iconShadow)"/>
      <text x="30" y="38" font-size="24" text-anchor="middle" fill="#FFFFFF">✨</text>
      <text x="30" y="75" font-family="Noto Serif SC, serif" font-size="12" fill="#555555" text-anchor="middle">出牌</text>
    </g>
    
    <!-- 胜利 -->
    <g transform="translate(0, 90)">
      <circle cx="30" cy="30" r="28" fill="url(#goldGrad)" stroke="#B8860B" stroke-width="2" filter="url(#iconShadow)"/>
      <text x="30" y="38" font-size="24" text-anchor="middle" fill="#FFFFFF">🏆</text>
      <text x="30" y="75" font-family="Noto Serif SC, serif" font-size="12" fill="#555555" text-anchor="middle">胜利</text>
    </g>
    
    <!-- 失败 -->
    <g transform="translate(80, 90)">
      <circle cx="30" cy="30" r="28" fill="#95A5A6" stroke="#7F8C8D" stroke-width="2" filter="url(#iconShadow)"/>
      <text x="30" y="38" font-size="24" text-anchor="middle" fill="#FFFFFF">😔</text>
      <text x="30" y="75" font-family="Noto Serif SC, serif" font-size="12" fill="#555555" text-anchor="middle">失败</text>
    </g>
    
    <!-- 炸弹 -->
    <g transform="translate(160, 90)">
      <circle cx="30" cy="30" r="28" fill="#E74C3C" stroke="#C0392B" stroke-width="2" filter="url(#iconShadow)"/>
      <text x="30" y="38" font-size="24" text-anchor="middle" fill="#FFFFFF">💥</text>
      <text x="30" y="75" font-family="Noto Serif SC, serif" font-size="12" fill="#555555" text-anchor="middle">炸弹</text>
    </g>
  </g>
  
  <!-- ==================== 花色图标 ==================== -->
  <g transform="translate(50, 300)">
    <text x="250" y="-20" font-family="Noto Serif SC, serif" font-size="16" fill="#1A1A1A" text-anchor="middle" font-weight="bold">花色图标 (48×48 px)</text>
    
    <!-- 红桃 -->
    <g transform="translate(0, 0)">
      <rect x="0" y="0" width="48" height="48" rx="8" fill="#F5F0E6" stroke="#C41E3A" stroke-width="2"/>
      <text x="24" y="34" font-size="32" text-anchor="middle" fill="#C41E3A">♥</text>
      <text x="24" y="65" font-family="Noto Serif SC, serif" font-size="12" fill="#C41E3A" text-anchor="middle">红桃</text>
    </g>
    
    <!-- 方块 -->
    <g transform="translate(70, 0)">
      <rect x="0" y="0" width="48" height="48" rx="8" fill="#F5F0E6" stroke="#C41E3A" stroke-width="2"/>
      <text x="24" y="34" font-size="32" text-anchor="middle" fill="#C41E3A">♦</text>
      <text x="24" y="65" font-family="Noto Serif SC, serif" font-size="12" fill="#C41E3A" text-anchor="middle">方块</text>
    </g>
    
    <!-- 草花 -->
    <g transform="translate(140, 0)">
      <rect x="0" y="0" width="48" height="48" rx="8" fill="#F5F0E6" stroke="#2E8B57" stroke-width="2"/>
      <text x="24" y="34" font-size="32" text-anchor="middle" fill="#2E8B57">♣</text>
      <text x="24" y="65" font-family="Noto Serif SC, serif" font-size="12" fill="#2E8B57" text-anchor="middle">草花</text>
    </g>
    
    <!-- 黑桃 -->
    <g transform="translate(210, 0)">
      <rect x="0" y="0" width="48" height="48" rx="8" fill="#F5F0E6" stroke="#1A1A1A" stroke-width="2"/>
      <text x="24" y="34" font-size="32" text-anchor="middle" fill="#1A1A1A">♠</text>
      <text x="24" y="65" font-family="Noto Serif SC, serif" font-size="12" fill="#1A1A1A" text-anchor="middle">黑桃</text>
    </g>
    
    <!-- 王牌 -->
    <g transform="translate(280, 0)">
      <rect x="0" y="0" width="48" height="48" rx="8" fill="#F5F0E6" stroke="#D4AF37" stroke-width="2"/>
      <text x="24" y="34" font-size="28" text-anchor="middle" fill="#D4AF37">🃏</text>
      <text x="24" y="65" font-family="Noto Serif SC, serif" font-size="12" fill="#D4AF37" text-anchor="middle">王牌</text>
    </g>
  </g>
  
  <!-- ==================== 牌面数值图标 ==================== -->
  <g transform="translate(50, 420)">
    <text x="250" y="-20" font-family="Noto Serif SC, serif" font-size="16" fill="#1A1A1A" text-anchor="middle" font-weight="bold">牌面数值 (36×36 px)</text>
    
    <!-- A -->
    <g transform="translate(0, 0)">
      <circle cx="18" cy="18" r="16" fill="#C41E3A"/>
      <text x="18" y="24" font-family="Noto Serif SC, serif" font-size="18" fill="#FFFFFF" text-anchor="middle" font-weight="bold">A</text>
    </g>
    
    <!-- K -->
    <g transform="translate(45, 0)">
      <circle cx="18" cy="18" r="16" fill="#C41E3A"/>
      <text x="18" y="24" font-family="Noto Serif SC, serif" font-size="18" fill="#FFFFFF" text-anchor="middle" font-weight="bold">K</text>
    </g>
    
    <!-- Q -->
    <g transform="translate(90, 0)">
      <circle cx="18" cy="18" r="16" fill="#C41E3A"/>
      <text x="18" y="24" font-family="Noto Serif SC, serif" font-size="18" fill="#FFFFFF" text-anchor="middle" font-weight="bold">Q</text>
    </g>
    
    <!-- J -->
    <g transform="translate(135, 0)">
      <circle cx="18" cy="18" r="16" fill="#C41E3A"/>
      <text x="18" y="24" font-family="Noto Serif SC, serif" font-size="18" fill="#FFFFFF" text-anchor="middle" font-weight="bold">J</text>
    </g>
    
    <!-- 10 -->
    <g transform="translate(180, 0)">
      <circle cx="18" cy="18" r="16" fill="#C41E3A"/>
      <text x="18" y="24" font-family="Arial" font-size="14" fill="#FFFFFF" text-anchor="middle" font-weight="bold">10</text>
    </g>
    
    <!-- 9-3 省略... -->
    <text x="250" y="22" font-family="Noto Serif SC, serif" font-size="12" fill="#999999" text-anchor="middle">2-9 略</text>
  </g>
  
  <!-- ==================== 特殊牌型标记 ==================== -->
  <g transform="translate(50, 520)">
    <text x="250" y="-20" font-family="Noto Serif SC, serif" font-size="16" fill="#1A1A1A" text-anchor="middle" font-weight="bold">特殊牌型标记</text>
    
    <!-- 级牌标记 -->
    <g transform="translate(0, 0)">
      <rect x="0" y="0" width="60" height="30" rx="15" fill="url(#goldGrad)" stroke="#B8860B" stroke-width="2"/>
      <text x="30" y="20" font-family="Noto Serif SC, serif" font-size="14" fill="#1A1A1A" text-anchor="middle" font-weight="bold">级牌</text>
    </g>
    
    <!-- 炸弹标记 -->
    <g transform="translate(80, 0)">
      <rect x="0" y="0" width="60" height="30" rx="15" fill="#E74C3C" stroke="#C0392B" stroke-width="2"/>
      <text x="30" y="20" font-family="Noto Serif SC, serif" font-size="14" fill="#FFFFFF" text-anchor="middle" font-weight="bold">炸弹</text>
    </g>
    
    <!-- 同花顺标记 -->
    <g transform="translate(180, 0)">
      <defs>
        <linearGradient id="rainbowGrad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" style="stop-color:#FF6B6B;stop-opacity:1" />
          <stop offset="50%" style="stop-color:#F4E5B1;stop-opacity:1" />
          <stop offset="100%" style="stop-color:#2EC4B6;stop-opacity:1" />
        </linearGradient>
      </defs>
      <rect x="0" y="0" width="80" height="30" rx="15" fill="url(#rainbowGrad)" stroke="#B8860B" stroke-width="2"/>
      <text x="40" y="20" font-family="Noto Serif SC, serif" font-size="14" fill="#1A1A1A" text-anchor="middle" font-weight="bold">同花顺</text>
    </g>
  </g>
  
  <!-- 装饰边框 -->
  <rect x="10" y="10" width="580" height="780" rx="10" fill="none" stroke="#D4AF37" stroke-width="2" stroke-dasharray="10,5"/>
</svg>
