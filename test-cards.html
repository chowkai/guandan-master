<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>牌面设计测试 - 极简设计 v1.4</title>
    <link rel="stylesheet" href="src/client/css/style.css">
    <style>
        body {
            padding: 40px;
            background: #f0f0f0;
            font-family: 'Noto Serif SC', serif;
        }
        h1 {
            text-align: center;
            margin-bottom: 40px;
        }
        .test-section {
            margin-bottom: 40px;
        }
        .test-section h2 {
            margin-bottom: 20px;
            color: #333;
        }
        .cards-row {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .card {
            margin: 0;
        }
    </style>
</head>
<body>
    <h1>🎴 掼蛋大师 - 极简牌面设计 v1.4 测试</h1>
    
    <div class="test-section">
        <h2>普通牌（红桃）</h2>
        <div class="cards-row">
            <div class="card">
                <div class="card-value-top" style="color: #C41E3A">A♥</div>
                <div class="card-suit-center" style="color: #C41E3A">♥</div>
            </div>
            <div class="card">
                <div class="card-value-top" style="color: #C41E3A">K♥</div>
                <div class="card-suit-center" style="color: #C41E3A">♥</div>
            </div>
            <div class="card">
                <div class="card-value-top" style="color: #C41E3A">Q♥</div>
                <div class="card-suit-center" style="color: #C41E3A">♥</div>
            </div>
            <div class="card">
                <div class="card-value-top" style="color: #C41E3A">J♥</div>
                <div class="card-suit-center" style="color: #C41E3A">♥</div>
            </div>
            <div class="card">
                <div class="card-value-top" style="color: #C41E3A">10♥</div>
                <div class="card-suit-center" style="color: #C41E3A">♥</div>
            </div>
        </div>
    </div>
    
    <div class="test-section">
        <h2>普通牌（黑桃）</h2>
        <div class="cards-row">
            <div class="card">
                <div class="card-value-top" style="color: #2E8B57">A♠</div>
                <div class="card-suit-center" style="color: #2E8B57">♠</div>
            </div>
            <div class="card">
                <div class="card-value-top" style="color: #2E8B57">7♠</div>
                <div class="card-suit-center" style="color: #2E8B57">♠</div>
            </div>
            <div class="card">
                <div class="card-value-top" style="color: #2E8B57">3♠</div>
                <div class="card-suit-center" style="color: #2E8B57">♠</div>
            </div>
        </div>
    </div>
    
    <div class="test-section">
        <h2>大小王</h2>
        <div class="cards-row">
            <div class="card joker joker-big">
                <div class="card-value-top">JOKER</div>
                <div class="card-suit-center">👑</div>
            </div>
            <div class="card joker joker-small">
                <div class="card-value-top">JOKER</div>
                <div class="card-suit-center">👑</div>
            </div>
        </div>
    </div>
    
    <div class="test-section">
        <h2>设计说明</h2>
        <ul style="max-width: 600px; margin: 0 auto; line-height: 1.8;">
            <li><strong>左上角</strong>：牌字 + 小花色（24px）- 横排紧密排列</li>
            <li><strong>中央</strong>：一个大花色图标（80px）- 极简设计</li>
            <li><strong>右下角</strong>：已移除 - 更简洁</li>
            <li><strong>大小王</strong>：JOKER 横排 + 王冠图标 - 无中文</li>
        </ul>
    </div>
</body>
</html>
